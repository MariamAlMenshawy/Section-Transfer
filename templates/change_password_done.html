{% extends 'base.html' %}
{% load static %}

{% block title %}Success{% endblock %}

{% block content %}
<div class="container profile-wrapper">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">

            <div class="card border-0 shadow-lg profile-card">
                <div class="card-body text-center p-5">

                    <!-- أيقونة النجاح -->
                    <div class="mb-3">
                        <i class="bi bi-check-circle-fill success-icon"></i>
                    </div>

                    <!-- العنوان -->
                    <h2 class="profile-title mb-3">
                        Password Changed!
                    </h2>

                    <!-- النص -->
                    <p class="text-muted mb-4 fs-5">
                        Your password has been updated successfully. You can now use your new password to log in next time.
                    </p>

                    <!-- الأزرار -->
                    <div class="d-flex flex-column flex-sm-row justify-content-center gap-3 mt-3">

                        <a href="{% url 'home' %}" class="btn save-btn">
                            Go to Home
                        </a>

                        <a href="{% url 'profile_info' %}" class="btn outline-btn">
                            View Profile
                        </a>

                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

<style>


.profile-card {
    border-radius: 25px;
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(10px);
}

.profile-title {
    font-size: 26px;
    font-weight: 700;
    color: #682f9e;
}

/* أيقونة النجاح */
.success-icon {
    font-size: 70px;
    color: #0c923d;
}


.save-btn {
    background: linear-gradient(135deg, #9f3bf6, #8825eb);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 10px 18px;
    font-weight: 600;
    transition: 0.3s;
    min-width: 160px;
}

.save-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(151, 59, 246, 0.3);
    color: white;
}


.outline-btn {
    border: 2px solid #9f3bf6;
    color: #9f3bf6;
    background: transparent;
    border-radius: 12px;
    padding: 10px 18px;
    font-weight: 600;
    min-width: 160px;
    transition: 0.3s;
}

.outline-btn:hover {
    background: #9f3bf6;
    color: white;
    transform: translateY(-2px);
}

/* body spacing */
body {
    padding-top: 90px !important;
    justify-content: flex-start !important;
}

</style>

{% endblock %}
